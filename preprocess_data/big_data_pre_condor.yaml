ds_name: hlt_smcocktail

data_processing:
  redir: ""
  sample_dir: "."
  out_path:   "/eos/user/e/escheull/smcocktail_1M_noZB"
   

  # --- PF candidates view (contrastive training input) ---
  pfcands: true
  n_objects: 400              # PF tokens per event
  sort_by_pt: true
  sk_spacing: null

  # --- AE object view (AE input) ---
  also_save_objects: true

  # --- dataset sizing ---
  nevents_per_class: 250000

  # --- outputs ---
  split: 0.8        
  store_by_class: false

  label_name_map:
    0: DY
    1: QCD
    2: TT
    3: WJet
    #4: ZB

  samples:
    - DY:
      - first_DY.txt
    - QCD:
      - first_QCD.txt
    - TT:
      - first_TT.txt
    - WJet:
      - first_WJet.txt
    #- ZB:
    #  - first_ZB.txt
